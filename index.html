<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>SISTEMA DE INTELIGENCIA GLOBAL</title>

<style>
  /* ESTÉTICA DE ORDENADOR MILITAR / ESPÍA */
  body {
    margin: 0; background: #050505; color: #00ff9d;
    font-family: 'Courier New', Courier, monospace;
    overflow: hidden; user-select: none;
  }

  /* Efecto de pantalla de tubo (CRT) y escáner */
  body::after {
    content: " "; display: block; position: absolute;
    top: 0; left: 0; bottom: 0; right: 0;
    background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
    z-index: 2; background-size: 100% 2px, 3px 100%; pointer-events: none;
  }

  /* Interfaz Principal HUD */
  .hud-box {
    position: absolute; background: rgba(0, 20, 0, 0.85);
    border: 1px solid #00ff9d; box-shadow: 0 0 10px rgba(0,255,157,0.2), inset 0 0 10px rgba(0,255,157,0.1);
    z-index: 10; padding: 15px;
  }

  /* Panel Superior Izquierdo */
  #top-left { top: 20px; left: 20px; border-left: 4px solid #00ff9d; }
  
  /* Panel de Información Lateral (Oculto por defecto) */
  #info-panel {
    top: 20px; right: 20px; width: 350px; height: 80vh;
    display: none; border-right: 4px solid #ff003c;
    color: #fff;
  }

  #info-panel h2 { color: #ff003c; text-shadow: 0 0 5px red; margin-top: 0; border-bottom: 1px solid #444; padding-bottom: 10px; font-size: 1.2em;}
  #info-panel .data-label { color: #00ff9d; font-weight: bold; font-size: 0.8em; margin-top: 10px; display: block; }
  #info-panel .data-value { color: #ddd; font-size: 0.9em; margin-bottom: 10px; display: block; line-height: 1.4; }
  
  .btn-cerrar {
    background: #ff003c; color: white; border: none; padding: 10px;
    width: 100%; cursor: pointer; font-weight: bold; letter-spacing: 2px;
    margin-top: 20px; text-transform: uppercase;
  }
  .btn-cerrar:hover { background: #fff; color: #ff003c; }

  /* Punto de mira central */
  .crosshair {
    position: absolute; top: 50%; left: 50%; width: 40px; height: 40px;
    transform: translate(-50%, -50%); border: 1px solid rgba(0, 255, 157, 0.3);
    border-radius: 50%; z-index: 1; pointer-events: none;
  }
  .crosshair::before { content: ""; position: absolute; top: 20px; left: -10px; width: 60px; height: 1px; background: rgba(0, 255, 157, 0.3); }
  .crosshair::after { content: ""; position: absolute; top: -10px; left: 20px; width: 1px; height: 60px; background: rgba(0, 255, 157, 0.3); }

  /* Etiqueta flotante al pasar el ratón */
  .globe-tooltip { background: rgba(0,0,0,0.9) !important; border: 1px solid #ff003c !important; color: white !important; font-family: monospace !important; padding: 10px !important; box-shadow: 0 0 10px red !important; }
</style>
</head>

<body>

<div class="hud-box" id="top-left">
  <b style="font-size: 1.2em; letter-spacing: 2px;">🔴 CENTRO DE MANDO</b><br>
  <span style="font-size: 0.8em; color: #aaa;">RED GUBERNAMENTAL SEGURA</span><br>
  <div style="margin-top: 10px; font-size: 0.8em;">
    SATÉLITES: <span style="color: #00ff9d;">EN LÍNEA</span><br>
    FILTRO: <span style="color: #ff003c;">MILITAR / INTELIGENCIA</span>
  </div>
</div>

<div class="hud-box" id="info-panel">
  <h2>INFORME DE INTELIGENCIA</h2>
  
  <span class="data-label">CÓDIGO DE EVENTO</span>
  <span class="data-value" id="panel-title">--</span>

  <span class="data-label">COORDENADAS APROX.</span>
  <span class="data-value" id="panel-coords">--</span>

  <span class="data-label">ANÁLISIS DE SITUACIÓN</span>
  <span class="data-value" id="panel-desc">--</span>

  <button class="btn-cerrar" onclick="cerrarPanel()">CERRAR COMUNICACIÓN</button>
</div>

<div class="crosshair"></div>
<div id="globeViz"></div>

<script src="https://unpkg.com/globe.gl"></script>

<script>
// Inicializar la bola del mundo con textura HD
const globe = Globe()(document.getElementById("globeViz"))
  .globeImageUrl("https://unpkg.com/three-globe/example/img/earth-water.png")
  .bumpImageUrl("https://unpkg.com/three-globe/example/img/earth-topology.png")
  .backgroundColor("#000000")
  .pointOfView({ lat: 30, lng: 35, altitude: 2 });

// Datos MILITARES reales estáticos (para garantizar que los ves y puedes hacer clic)
const inteligenciaMilitar = [
  {
    titulo: "MOVIMIENTO DE TROPAS EN FRONTERA",
    desc: "Satélites de reconocimiento detectan reagrupamiento de unidades blindadas en el sector este. Posible preparación para maniobras de avance. Se mantiene nivel de alerta elevado en la región.",
    lat: 48.3, lng: 35.0, color: "#ff003c" // Ucrania
  },
  {
    titulo: "INCIDENTE MARÍTIMO DE SEGURIDAD",
    desc: "Reporte de interceptación de drones submarinos no tripulados cerca de rutas comerciales clave. Unidades de patrulla costera han sido desplegadas para asegurar el perímetro.",
    lat: 20.2, lng: 38.5, color: "#ff003c" // Mar Rojo
  },
  {
    titulo: "ALERTA DE BOMBARDEO TÁCTICO",
    desc: "Múltiples explosiones confirmadas en instalaciones logísticas. Fuentes de inteligencia sugieren ataques aéreos dirigidos a infraestructura militar crítica. Daños en evaluación.",
    lat: 33.8, lng: 35.5, color: "#ff003c" // Líbano
  },
  {
    titulo: "TENSIÓN NUCLEAR / MISILES",
    desc: "Aviso de lanzamiento de prueba de misil balístico de corto alcance. Cayó en aguas internacionales. Los sistemas de defensa antimisiles regionales están en estado de pre-alerta.",
    lat: 39.0, lng: 125.7, color: "#ffaa00" // Corea
  }
];

// Dibujar los puntos con hitboxes GIGANTES para asegurar el clic
globe.pointsData(inteligenciaMilitar)
  .pointColor("color")
  .pointAltitude(0.08)
  .pointRadius(1.2) // Super grande para no fallar el clic
  .pointResolution(32)
  .pointLabel(d => `⚠️ ${d.titulo}`) // Hover limpio
  .onPointClick((d) => {
    // ESTO ABRE EL PANEL LATERAL SIN SACARTE DE LA PÁGINA
    document.getElementById("info-panel").style.display = "block";
    document.getElementById("panel-title").innerText = d.titulo;
    document.getElementById("panel-coords").innerText = `LAT: ${d.lat.toFixed(4)} | LNG: ${d.lng.toFixed(4)}`;
    document.getElementById("panel-desc").innerText = d.desc;
  });

// Anillos tipo radar
globe.ringsData(inteligenciaMilitar)
  .ringColor("color")
  .ringMaxRadius(5)
  .ringPropagationSpeed(2)
  .ringRepeatPeriod(1000);

// Cambiar cursor al pasar por encima
globe.onPointHover(p => {
  document.body.style.cursor = p ? "crosshair" : "default";
});

// Función para cerrar el panel
function cerrarPanel() {
  document.getElementById("info-panel").style.display = "none";
}
</script>
</body>
</html>
