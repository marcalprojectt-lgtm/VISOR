<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>INTELIGENCIA GLOBAL 3D</title>
    <script src="https://unpkg.com/globe.gl"></script>
    <style>
        body { margin: 0; background-color: #000; overflow: hidden; color: #0f0; font-family: monospace; }
        #globeViz { width: 100vw; height: 100vh; }
        .radar-panel {
            position: absolute; top: 20px; left: 20px; 
            background: rgba(0, 20, 0, 0.9); padding: 15px; 
            border: 2px solid #0f0; z-index: 100;
            box-shadow: 0 0 15px #0f0; pointer-events: none;
        }
    </style>
</head>
<body>
    <div class="radar-panel">
        <b style="color:red">SISTEMA DE RASTREO ACTIVO</b><br>
        <span>MODO: VIGILANCIA GLOBAL 3D</span><br>
        <small id="status">INICIALIZANDO...</small>
    </div>

    <div id="globeViz"></div>

    <script>
        // Inicializamos el globo con una configuración básica para que NO falle
        const globe = Globe()
            (document.getElementById('globeViz'))
            .globeImageUrl('https://unpkg.com/three-globe/example/img/earth-night.jpg')
            .backgroundColor('#000000');

        async function cargarInteligencia() {
            const status = document.getElementById('status');
            try {
                // Usamos la red de la ONU (ReliefWeb)
                const response = await fetch('https://api.reliefweb.int/v1/reports?appname=visor&limit=50&sort[]=date:desc');
                const data = await response.json();
                
                // Filtramos datos que tengan coordenadas
                const points = data.data
                    .filter(d => d.fields && d.fields.primary_country && d.fields.primary_country.location)
                    .map(d => ({
                        lat: d.fields.primary_country.location.lat,
                        lng: d.fields.primary_country.location.lon,
                        name: d.fields.title,
                        color: d.fields.title.toLowerCase().includes('attack') ? 'red' : 'orange'
                    }));

                globe.pointsData(points)
                    .pointColor('color')
                    .pointAltitude(0.1)
                    .pointRadius(0.5);

                status.innerText = "CONEXIÓN ESTABLECIDA - DATOS CARGADOS";
                status.style.color = "#0f0";
            } catch (err) {
                status.innerText = "ERROR DE RED - REINTENTANDO...";
                status.style.color = "red";
            }
        }

        cargarInteligencia();
        // Centrar en el mundo
        globe.pointOfView({ altitude: 2.5 });
    </script>
</body>
</html>
