<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>SISTEMA DE INTELIGENCIA MILITAR</title>
    <script src="https://cdn.jsdelivr.net/npm/globe.gl"></script>
    <style>
        body { margin: 0; background-color: #000; overflow: hidden; color: #0f0; font-family: monospace; }
        #globeViz { width: 100vw; height: 100vh; background: #000; }
        .radar-panel {
            position: absolute; top: 20px; left: 20px; 
            background: rgba(0, 20, 0, 0.9); padding: 15px; 
            border: 1px solid #0f0; z-index: 100;
            box-shadow: 0 0 15px #0f0; pointer-events: none;
        }
    </style>
</head>
<body>
    <div class="radar-panel">
        <b style="color:red">🛰️ MONITOR MILITAR 3.0</b><br>
        <span id="status">INICIALIZANDO SISTEMA...</span>
    </div>

    <div id="globeViz"></div>

    <script>
        // 1. CREAR EL GLOBO INMEDIATAMENTE (Para evitar pantalla negra)
        const globe = Globe()(document.getElementById('globeViz'))
            .globeImageUrl('https://unpkg.com/three-globe/example/img/earth-night.jpg')
            .backgroundColor('#000000')
            .pointColor(() => '#ff0000')
            .pointAltitude(0.2)
            .pointRadius(1.5)
            .pointOfView({ lat: 30, lng: 30, altitude: 2.5 });

        // 2. DATOS DE EMERGENCIA (Para que siempre haya puntos, pase lo que pase)
        const puntosEmergencia = [
            { lat: 31.4, lng: 34.4, title: "OPERACIÓN MILITAR - GAZA", url: "#" },
            { lat: 48.3, lng: 35.0, title: "CONFLICTO ACTIVO - UCRANIA", url: "#" },
            { lat: 33.8, lng: 35.5, title: "MOVIMIENTOS DE ARTILLERÍA - LÍBANO", url: "#" }
        ];

        // Pintamos los puntos de emergencia al arrancar
        globe.pointsData(puntosEmergencia);
        globe.ringsData(puntosEmergencia);
        document.getElementById('status').innerText = "SISTEMA ONLINE (DATOS DE EMERGENCIA)";

        // 3. INTENTAR CARGAR DATOS REALES (Sin bloquear el mapa)
        async function fetchLiveIntel() {
            try {
                const query = encodeURIComponent('airstrike OR "military attack"');
                const url = `https://api.rss2json.com/v1/api.json?rss_url=https%3A%2F%2Fnews.google.com%2Frss%2Fsearch%3Fq%3D${query}%26hl%3Den-US`;
                
                const response = await fetch(url);
                const data = await response.json();
                
                if(data.status === 'ok') {
                    const newsPoints = data.items.map(item => ({
                        lat: 20 + (Math.random() * 20), // Aproximación a zona caliente
                        lng: 30 + (Math.random() * 20),
                        title: item.title,
                        url: item.link
                    }));
                    
                    // Mezclamos emergencia con reales
                    globe.pointsData([...puntosEmergencia, ...newsPoints]);
                    document.getElementById('status').innerText = "CONEXIÓN SATELITAL COMPLETA";
                    document.getElementById('status').style.color = "#0f0";
                }
            } catch (e) {
                console.log("Fallo de API, manteniendo modo emergencia.");
            }
        }

        // Ejecutar búsqueda real a los 2 segundos
        setTimeout(fetchLiveIntel, 2000);
    </script>
</body>
</html>
