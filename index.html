<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>TERMINAL DE INTELIGENCIA MILITAR</title>
    <script src="https://unpkg.com/globe.gl"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; color: #0f0; font-family: 'Courier New', monospace; }
        #globeViz { width: 100vw; height: 100vh; }
        .radar-panel {
            position: absolute; top: 20px; left: 20px; 
            background: rgba(0, 15, 0, 0.95); padding: 20px; 
            border: 1px solid #0f0; z-index: 100;
            box-shadow: 0 0 20px rgba(0,255,0,0.2); pointer-events: none;
        }
        #info-box {
            position: absolute; bottom: 30px; left: 20px;
            width: 380px; background: rgba(0,0,0,0.9);
            border-left: 5px solid #ff0000; color: #fff; padding: 15px;
            font-size: 13px; display: none; z-index: 100;
            box-shadow: 10px 10px 25px rgba(0,0,0,0.5);
        }
        .alerta-roja { color: #ff3333; font-weight: bold; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
    </script>
</head>
<body>
    <div class="radar-panel">
        <b class="alerta-roja">⚠️ MONITOR DE CONFLICTO ACTIVO</b><br>
        <span style="font-size: 0.8em;">FUENTE: UN-OCHA / RELIEFWEB INTELLIGENCE</span><br>
        <hr style="border: 0.5px solid #0f0; margin: 10px 0;">
        <small id="status">Sincronizando coordenadas...</small>
    </div>

    <div id="info-box"></div>
    <div id="globeViz"></div>

    <script>
        const globe = Globe()
            (document.getElementById('globeViz'))
            .globeImageUrl('https://unpkg.com/three-globe/example/img/earth-night.jpg')
            .backgroundColor('#000000')
            .pointColor(() => '#ff0000')
            .pointAltitude(0.2)
            .pointRadius(1.2);

        async function fetchIntel() {
            const status = document.getElementById('status');
            try {
                // Filtro agresivo: Solo temas de seguridad, conflicto y paz
                const url = `https://api.reliefweb.int/v1/reports?appname=visor&filter[field]=theme&filter[value]=Peace%20and%20Security&limit=40&profile=full&sort[]=date:desc`;
                
                const response = await fetch(url);
                const data = await response.json();
                
                // PROCESAMIENTO ESTRICTO: Solo si tiene coordenadas verificadas
                const filteredPoints = data.data
                    .filter(d => d.fields && d.fields.primary_country && d.fields.primary_country.location)
                    .map(d => ({
                        lat: d.fields.primary_country.location.lat,
                        lng: d.fields.primary_country.location.lon,
                        title: d.fields.title,
                        source: d.fields.source[0].name,
                        date: new Date(d.fields.date.created).toLocaleDateString(),
                        country: d.fields.primary_country.name,
                        url: d.fields.url
                    }));

                globe.pointsData(filteredPoints)
                    .onPointClick(d => {
                        const box = document.getElementById('info-box');
                        box.style.display = 'block';
                        box.innerHTML = `
                            <b style="color:#ff3333">REPORTE DE OPERACIONES</b><br>
                            <hr style="border:0.5px solid #333">
                            <strong>UBICACIÓN:</strong> ${d.country}<br>
                            <strong>FUENTE:</strong> ${d.source}<br>
                            <strong>FECHA:</strong> ${d.date}<br><br>
                            <span style="color:#aaa">${d.title}</span><br><br>
                            <a href="${d.url}" target="_blank" style="color:#0f0; text-decoration:none;">[ ACCEDER AL ARCHIVO ]</a>
                        `;
                    });

                // Efecto radar de anillos solo para los puntos detectados
                globe.ringsData(filteredPoints)
                    .ringColor(() => '#ff0000')
                    .ringMaxRadius(3)
                    .ringPropagationSpeed(1)
                    .ringRepeatPeriod(1200);

                status.innerText = `ESPECTRO LIMPIO: ${filteredPoints.length} OBJETIVOS ENCONTRADOS`;
                status.style.color = "#0f0";

            } catch (err) {
                status.innerText = "FALLO EN LA TRANSMISIÓN";
                status.style.color = "red";
            }
        }

        fetchIntel();
        globe.pointOfView({ lat: 20, lng: 40, altitude: 2.2 });
    </script>
</body>
</html>
