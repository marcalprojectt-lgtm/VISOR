<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>SISTEMA DE INTELIGENCIA MILITAR 3D</title>
    <script src="https://unpkg.com/globe.gl"></script>
    <style>
        body { margin: 0; background-color: #000; overflow: hidden; color: #0f0; font-family: 'Courier New', monospace; }
        #globeViz { width: 100vw; height: 100vh; }
        .radar-panel {
            position: absolute; top: 20px; left: 20px; 
            background: rgba(0, 20, 0, 0.95); padding: 15px; 
            border: 1px solid #0f0; z-index: 100;
            box-shadow: 0 0 15px #0f0; pointer-events: none;
        }
        #info-box {
            position: absolute; bottom: 20px; left: 20px;
            width: 350px; background: rgba(0,0,0,0.9);
            border: 1px solid #ff0000; color: #fff; padding: 15px;
            font-size: 13px; display: none; z-index: 100;
            border-left: 5px solid red;
        }
    </style>
</head>
<body>
    <div class="radar-panel">
        <b style="color:red; font-size:1.2em;">⚠️ MONITOR DE COMBATE GLOBAL</b><br>
        <span>STATUS: RASTREO SATELITAL ACTIVO</span><br>
        <small id="status" style="color:#fff">SINCRONIZANDO CON AGENCIAS...</small>
    </div>

    <div id="info-box"></div>
    <div id="globeViz"></div>

    <script>
        // Inicializar globo 3D
        const globe = Globe()
            (document.getElementById('globeViz'))
            .globeImageUrl('https://unpkg.com/three-globe/example/img/earth-night.jpg')
            .backgroundColor('#000000')
            .pointColor(() => '#ff0000')
            .pointAltitude(0.15)
            .pointRadius(1.2);

        // Coordenadas verificadas de zonas calientes para evitar puntos en el mar
        const hotZones = {
            "gaza": [31.4, 34.4], "israel": [31.5, 34.8], "lebanon": [33.8, 35.5],
            "ukraine": [48.3, 35.0], "russia": [55.7, 37.6], "yemen": [15.5, 44.2],
            "syria": [34.8, 38.9], "iran": [32.4, 53.6], "taiwan": [23.5, 121.0],
            "red sea": [20.2, 38.5], "sudan": [15.8, 30.1], "iraq": [33.3, 44.3]
        };

        async function fetchIntel() {
            const status = document.getElementById('status');
            try {
                // Buscamos noticias de combate reales a través de un servicio estable
                const query = encodeURIComponent('"airstrike" OR "bombing" OR "military attack" OR "combat"');
                const url = `https://api.rss2json.com/v1/api.json?rss_url=https%3A%2F%2Fnews.google.com%2Frss%2Fsearch%3Fq%3D${query}%26hl%3Den-US%26gl%3DUS%26ceid%3DUS%3Aen`;
                
                const response = await fetch(url);
                const data = await response.json();
                
                if(data.status !== 'ok') throw new Error();

                const points = data.items.map(item => {
                    const text = (item.title + " " + item.content).toLowerCase();
                    let coords = [Math.random() * 20, Math.random() * 20]; // Fallback seguro
                    
                    // Asignación de coordenadas por palabras clave encontradas en la noticia
                    for (let city in hotZones) {
                        if (text.includes(city)) {
                            coords = hotZones[city];
                            break;
                        }
                    }

                    return {
                        lat: coords[0],
                        lng: coords[1],
                        title: item.title,
                        url: item.link,
                        date: item.pubDate
                    };
                }).filter(p => p.lat !== 0); // Limpieza de errores

                globe.pointsData(points)
                    .onPointClick(d => {
                        const box = document.getElementById('info-box');
                        box.style.display = 'block';
                        box.innerHTML = `
                            <strong style="color:red">REPORTE DE INTELIGENCIA</strong><br>
                            <hr style="border:0.5px solid red">
                            <strong>FECHA:</strong> ${d.date}<br>
                            <strong>EVENTO:</strong> ${d.title}<br><br>
                            <a href="${d.url}" target="_blank" style="color:#0f0">[ ABRIR INFORME DE COMBATE ]</a>
                        `;
                    });

                // Efecto de radar parpadeante
                globe.ringsData(points.slice(0, 15))
                    .ringColor(() => '#ff0000')
                    .ringMaxRadius(4)
                    .ringPropagationSpeed(2);

                status.innerText = "SISTEMA ONLINE - MONITOREANDO COMBATE";
                status.style.color = "#0f0";

            } catch (e) {
                status.innerText = "REINTENTANDO CONEXIÓN SEGURA...";
                status.style.color = "orange";
                setTimeout(fetchIntel, 5000);
            }
        }

        fetchIntel();
        globe.pointOfView({ lat: 30, lng: 35, altitude: 2.2 });
    </script>
</body>
</html>
