<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Military Intelligence System</title>

<style>
body {
  margin: 0;
  background: black;
  font-family: monospace;
  overflow: hidden;
}

/* PANEL INFO */
#panel {
  position: absolute;
  top: 20px;
  right: 20px;
  width: 320px;
  background: rgba(0,0,0,0.95);
  border: 1px solid #00ff9d;
  padding: 15px;
  color: #00ff9d;
  display: none;
  box-shadow: 0 0 15px #00ff9d;
}

/* HUD */
#hud {
  position: absolute;
  top: 20px;
  left: 20px;
  color: #00ff9d;
  border: 1px solid #00ff9d;
  padding: 10px;
  box-shadow: 0 0 10px #00ff9d;
}

/* STATUS */
#status {
  position: absolute;
  bottom: 20px;
  left: 20px;
  color: orange;
}
</style>

</head>

<body>

<div id="hud">
🛰️ MONITOR MILITAR 3.0<br>
<span id="systemStatus">INICIANDO...</span>
</div>

<div id="panel">
<h3 id="title"></h3>
<a id="link" target="_blank">Abrir fuente</a>
</div>

<div id="status"></div>
<div id="globeViz"></div>

<script src="//unpkg.com/globe.gl"></script>

<script>

const WORKER_URL = "TU_WORKER_URL"; // ⚠️ CAMBIAR

const statusEl = document.getElementById("status");
const sys = document.getElementById("systemStatus");

/* 🌍 GLOBO */
const globe = Globe()(document.getElementById("globeViz"))
  .globeImageUrl('//unpkg.com/three-globe/example/img/earth-night.jpg')
  .backgroundColor('#000000')
  .pointAltitude(0.008)
  .pointRadius(0.08)
  .pointColor(() => "#00ff9d");

/* 🎯 DATOS */
async function loadData() {
  try {
    sys.innerText = "CONECTANDO INTEL...";

    const res = await fetch(WORKER_URL);
    const data = await res.json();

    const mapped = data.map(d => {
      const coords = getCoords(d.title);

      return {
        lat: coords.lat,
        lng: coords.lng,
        title: d.title || "Sin título",
        link: d.link || "#"
      };
    });

    globe.pointsData(mapped);

    /* 🔴 RING EFECT */
    globe.ringsData(mapped)
      .ringColor(() => t => `rgba(0,255,157,${1-t})`)
      .ringMaxRadius(2)
      .ringPropagationSpeed(1.2)
      .ringRepeatPeriod(1800);

    globe.onPointClick(p => {
      showPanel(p);
    });

    sys.innerText = "SISTEMA ACTIVO";
    statusEl.innerText = "Eventos detectados: " + mapped.length;

  } catch (e) {
    console.error(e);
    retry();
  }
}

/* 🔁 RETRY */
function retry() {
  sys.innerText = "REINTENTANDO CONEXIÓN...";
  setTimeout(loadData, 4000);
}

/* 📍 GEO DETECCIÓN MEJORADA */
function getCoords(text) {

  const map = {
    "ukraine": [48,31],
    "russia": [60,90],
    "israel": [31,35],
    "gaza": [31.5,34.5],
    "lebanon": [33.8,35.8],
    "syria": [34,38],
    "iran": [32,53],
    "iraq": [33,44],
    "afghanistan": [33,66],
    "china": [35,103],
    "taiwan": [23,121],
    "north korea": [40,127],
    "south korea": [36,128],
    "japan": [36,138],
    "india": [21,78],
    "pakistan": [30,70],
    "yemen": [15,48],
    "saudi": [24,45],
    "egypt": [26,30],
    "libya": [26,17],
    "sudan": [15,30],
    "turkey": [39,35],
    "france": [46,2],
    "germany": [51,10],
    "poland": [52,19],
    "uk": [55,-3],
    "usa": [39,-98],
    "mexico": [23,-102],
    "brazil": [-14,-51]
  };

  const lower = text.toLowerCase();

  for (let key in map) {
    if (lower.includes(key)) {
      return { lat: map[key][0], lng: map[key][1] };
    }
  }

  /* 🧠 FALLBACK INTELIGENTE */
  return {
    lat: (Math.random() * 140 - 70),
    lng: (Math.random() * 360 - 180)
  };
}

/* 📊 PANEL INFO */
function showPanel(p) {
  const panel = document.getElementById("panel");

  document.getElementById("title").innerText = p.title;
  document.getElementById("link").href = p.link;

  panel.style.display = "block";
}

/* INIT */
loadData();

</script>

</body>
</html>
