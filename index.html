<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>SISTEMA DE INTELIGENCIA - LIVE</title>
    <script src="https://unpkg.com/globe.gl"></script>
    <style>
        body { margin: 0; background-color: #000; overflow: hidden; color: #0f0; font-family: monospace; }
        #globeViz { width: 100vw; height: 100vh; }
        .radar-panel {
            position: absolute; top: 20px; left: 20px; 
            background: rgba(0, 20, 0, 0.9); padding: 15px; 
            border: 1px solid #0f0; z-index: 100;
            box-shadow: 0 0 15px #0f0; pointer-events: none;
        }
        #info-box {
            position: absolute; bottom: 20px; left: 20px;
            width: 320px; background: rgba(0,0,0,0.95);
            border: 1px solid #ff0000; color: #fff; padding: 15px;
            font-size: 13px; display: none; z-index: 100;
            border-left: 5px solid red;
        }
    </style>
</head>
<body>
    <div class="radar-panel">
        <b style="color:red">⚠️ TERMINAL DE INTELIGENCIA</b><br>
        <span id="status">INICIALIZANDO ESCÁNER...</span>
    </div>

    <div id="info-box"></div>
    <div id="globeViz"></div>

    <script>
        const globe = Globe()
            (document.getElementById('globeViz'))
            .globeImageUrl('https://unpkg.com/three-globe/example/img/earth-night.jpg')
            .backgroundColor('#000000')
            .pointColor(() => '#ff0000')
            .pointAltitude(0.15)
            .pointRadius(1.2);

        async function init() {
            const status = document.getElementById('status');
            try {
                // Usamos un proxy público para saltar el bloqueo de seguridad
                const proxy = "https://api.allorigins.win/get?url=";
                const target = encodeURIComponent("https://api.gdeltproject.org/api/v2/doc/doc?query=(military%20OR%20attack%20OR%20conflict%20OR%20airstrike)&mode=Updates&format=JSON&maxrows=20");
                
                const response = await fetch(proxy + target);
                const rawData = await response.json();
                const data = JSON.parse(rawData.contents);
                
                // Si GDELT no da coordenadas, las asignamos nosotros por palabras clave
                const coords = {
                    "israel": [31.5, 34.8], "gaza": [31.4, 34.4], "lebanon": [33.8, 35.5],
                    "ukraine": [48.3, 35.0], "syria": [34.8, 38.9], "yemen": [15.5, 44.2],
                    "iran": [32.4, 53.6], "russia": [55.7, 37.6], "taiwan": [23.5, 121.0]
                };

                const points = data.articles.map(art => {
                    let text = (art.title + " " + art.sourcecountry).toLowerCase();
                    let finalCoord = [Math.random() * 40, Math.random() * 40]; // Fallback
                    
                    for (let key in coords) {
                        if (text.includes(key)) {
                            finalCoord = coords[key];
                            break;
                        }
                    }

                    return {
                        lat: finalCoord[0],
                        lng: finalCoord[1],
                        title: art.title,
                        url: art.url,
                        source: art.sourcecountry || "INTEL"
                    };
                });

                globe.pointsData(points)
                    .onPointClick(d => {
                        const box = document.getElementById('info-box');
                        box.style.display = 'block';
                        box.innerHTML = `
                            <strong style="color:red">REPORTE DETECTADO</strong><br>
                            <hr style="border:0.5px solid red">
                            <strong>FUENTE:</strong> ${d.source}<br>
                            <strong>NOTICIA:</strong> ${d.title}<br><br>
                            <a href="${d.url}" target="_blank" style="color:#0f0">[ ABRIR ENLACE SEGURO ]</a>
                        `;
                    });

                globe.ringsData(points.slice(0, 5))
                    .ringColor(() => '#ff0000')
                    .ringMaxRadius(5)
                    .ringPropagationSpeed(2);

                status.innerText = "CONEXIÓN CIFRADA ESTABLECIDA";
                status.style.color = "#0f0";

            } catch (e) {
                status.innerText = "ERROR EN EL SALTO DE PROXY";
                status.style.color = "red";
            }
        }

        init();
        globe.pointOfView({ lat: 30, lng: 35, altitude: 2 });
    </script>
</body>
</html>
