<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>DASHBOARD DE ANALISTA OFFLINE V1.0</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <style>
        :root { --green: #0f0; --dark-green: #051; --alert: #ff003c; --bg: #000; --widget-bg: rgba(0, 15, 0, 0.9); }
        body { margin: 0; background-color: var(--bg); color: var(--green); font-family: 'Courier New', Courier, monospace; overflow: hidden; height: 100vh; display: grid; grid-template-rows: auto 1fr; user-select: none; }
        
        /* Efecto de pantalla CRT militar */
        body::after { content: " "; display: block; position: absolute; top: 0; left: 0; bottom: 0; right: 0; background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06)); z-index: 2; background-size: 100% 2px, 3px 100%; pointer-events: none; opacity: 0.6; }

        header { padding: 15px; border-bottom: 2px solid var(--green); background: var(--widget-bg); box-shadow: 0 0 10px rgba(0,255,0,0.3); }
        .grid-main { display: grid; grid-template-columns: 2fr 1fr; gap: 20px; padding: 20px; box-sizing: border-box; }
        .widget { background: var(--widget-bg); border: 1px solid var(--green); padding: 15px; border-radius: 4px; box-sizing: border-box; box-shadow: 0 0 10px rgba(0,255,0,0.1); }
        h2 { margin-top: 0; font-size: 1.1em; border-bottom: 1px solid var(--green); padding-bottom: 5px; text-transform: uppercase; color: #fff; text-shadow: 0 0 5px var(--green); }
        
        /* Bloc de Notas Encriptado */
        #notepad { display: flex; flex-direction: column; height: 100%; }
        textarea { flex-grow: 1; background: transparent; border: 1px dashed var(--green); color: var(--green); padding: 10px; font-family: inherit; font-size: 0.95em; resize: none; margin-bottom: 10px; }
        input[type="password"] { background: var(--bg); border: 1px solid var(--dark-green); color: var(--green); padding: 8px; font-family: inherit; margin-bottom: 10px; }
        .btn-group { display: flex; gap: 10px; }
        button { flex-grow: 1; padding: 10px; font-family: inherit; cursor: pointer; border: 1px solid var(--green); font-weight: bold; background: #000; color: var(--green); text-transform: uppercase; }
        button:hover { background: var(--green); color: #000; }
        button.alert { border-color: var(--alert); color: var(--alert); }
        button.alert:hover { background: var(--alert); color: #fff; }

        /* Widget de Tiempo */
        .time-box { text-align: center; }
        #clock { font-size: 2.2em; font-weight: bold; margin-bottom: 5px; color: #fff; text-shadow: 0 0 5px #fff; }
        #date { font-size: 0.9em; margin-bottom: 15px; color: #aaa; }
        #stopwatch { font-size: 1.8em; color: orange; border: 1px solid orange; padding: 5px; margin-bottom: 10px; }
        .sw-btn-group { display: flex; gap: 5px; }
        .sw-btn-group button { border-color: orange; color: orange; font-size: 0.8em; padding: 5px; }
        .sw-btn-group button:hover { background: orange; color: #000; }

        /* Generador de Claves */
        #pass-generator input { width: 100%; background: var(--bg); border: 1px solid var(--green); color: var(--green); padding: 8px; font-family: inherit; margin-bottom: 10px; font-size: 0.9em;}
    </style>
</head>
<body>
    <header>
        <b>Terminal de Analista: <span style="color:#fff">OFFLINE_COMMAND</span></b> | Estado: <b style="color:#fff">100% LOCAL (CIFRADO AES)</b>
    </header>

    <main class="grid-main">
        <section class="widget" id="notepad">
            <h2>🛡️ Bloc de Notas Encriptado</h2>
            <textarea id="note-content" placeholder="Escribe aquí tu análisis clasificado..."></textarea>
            <input type="password" id="note-key" placeholder="Introduce clave de encriptación (AES)">
            <div class="btn-group">
                <button onclick="saveAndEncrypt()" title="Encriptar y guardar en el navegador">🔒 Cifrar & Guardar</button>
                <button onclick="decryptAndLoad()" title="Usar clave para descifrar notas">🔑 Descifrar</button>
                <button class="alert" onclick="wipeNotes()" title="Borrar todo inmediatamente">💣 BORRADO</button>
            </div>
            <small style="font-size: 0.7em; color: #aaa; margin-top: 5px;">*Tus notas encriptadas se guardan en este navegador y jamás viajan por internet.</small>
        </section>

        <aside style="display: flex; flex-direction: column; gap: 20px;">
            <div class="widget time-box">
                <h2>🛰️ Tiempo de Misión</h2>
                <div id="clock">00:00:00</div>
                <div id="date">--/--/--</div>
                <hr style="border:0.5px solid var(--dark-green);">
                <span class="data-label" style="font-size: 0.8em;">CRONÓMETRO OPERATIVO</span>
                <div id="stopwatch">00:00:00</div>
                <div class="sw-btn-group">
                    <button onclick="startSW()">INICIAR</button>
                    <button onclick="stopSW()">DETENER</button>
                    <button onclick="resetSW()">RESET</button>
                </div>
            </div>

            <div class="widget" id="pass-generator">
                <h2>🔑 Generador de Contraseñas Seguras</h2>
                <input type="text" id="gen-password" readonly placeholder="Clave generada">
                <div style="display: flex; gap: 10px;">
                    <button onclick="generatePassword()" style="font-size: 0.8em; border-color:#0088ff; color:#0088ff;">Generar Clave</button>
                    <button onclick="copyPassword()" style="font-size: 0.8em; border-color:#fff; color:#fff;">Copiar</button>
                </div>
            </div>
        </aside>
    </main>

    <script>
        // --- RELOJ Y FECHA ---
        function updateClock() {
            const now = new Date();
            document.getElementById('clock').innerText = now.toLocaleTimeString();
            document.getElementById('date').innerText = now.toLocaleDateString();
        }
        setInterval(updateClock, 1000);
        updateClock();

        // --- BLOC DE NOTAS ENCRIPTADO (LOCALSTORAGE + AES) ---
        // Intentar cargar notas encriptadas al abrir
        const savedNotes = localStorage.getItem('analystNotesV1');
        if (savedNotes) {
            document.getElementById('note-content').value = "-- [ NOTAS DETECTADAS - ESTÁN ENCRIPTADAS ] --";
        }

        // Guardar y encriptar
        function saveAndEncrypt() {
            const text = document.getElementById('note-content').value;
            const key = document.getElementById('note-key').value;

            if (text.length === 0) { alert('El bloc de notas está vacío.'); return; }
            if (key.length < 4) { alert('Por seguridad, usa una clave de al menos 4 caracteres.'); return; }

            try {
                // Encriptar AES usando la librería CryptoJS
                const encrypted = CryptoJS.AES.encrypt(text, key).toString();
                // Guardar en LocalStorage (la memoria de tu navegador)
                localStorage.setItem('analystNotesV1', encrypted);
                document.getElementById('note-key').value = ''; // Limpiar campo clave
                alert('Notas encriptadas y guardadas localmente.');
            } catch (e) {
                alert('Fallo en la encriptación.');
            }
        }

        // Desencriptar y cargar
        function decryptAndLoad() {
            const encryptedNotes = localStorage.getItem('analystNotesV1');
            const key = document.getElementById('note-key').value;

            if (!encryptedNotes) { alert('No hay notas guardadas en este navegador.'); return; }
            if (key.length < 4) { alert('Introduce una clave válida.'); return; }

            try {
                // Desencriptar AES
                const bytes = CryptoJS.AES.decrypt(encryptedNotes, key);
                const decrypted = bytes.toString(CryptoJS.enc.Utf8);

                if (decrypted) {
                    document.getElementById('note-content').value = decrypted;
                    alert('Notas descifradas con éxito.');
                } else {
                    alert('Clave incorrecta. El descifrado ha fallado.');
                    document.getElementById('note-content').value = "-- [ CLAVE INCORRECTA ] --";
                }
            } catch (e) {
                alert('Clave incorrecta. Fallo crítico de descifrado.');
            }
        }

        // Borrado de emergencia
        function wipeNotes() {
            if (confirm("⚠️ ¿Estás seguro? Se borrarán las notas encriptadas para siempre.")) {
                localStorage.removeItem('analystNotesV1');
                document.getElementById('note-content').value = "";
                document.getElementById('note-key').value = "";
                alert('Bases de datos locales eliminadas.');
            }
        }

        // --- CRONÓMETRO DE OPERACIÓN ---
        let swInterval;
        let swTime = 0; // segundos
        function formatTime(t) { return new Date(t * 1000).toISOString().substr(11, 8); }
        function startSW() { if(!swInterval) swInterval = setInterval(() => { swTime++; document.getElementById('stopwatch').innerText = formatTime(swTime); }, 1000); }
        function stopSW() { clearInterval(swInterval); swInterval = null; }
        function resetSW() { stopSW(); swTime = 0; document.getElementById('stopwatch').innerText = "00:00:00"; }

        // --- GENERADOR DE CLAVES (SECCIÓN LOCAL) ---
        function generatePassword() {
            const length = 24;
            const charset = "abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789!@#$%^&*()_+=-[]{};:,.<>?";
            let retVal = "";
            for (let i = 0, n = charset.length; i < length; ++i) {
                retVal += charset.charAt(Math.floor(Math.random() * n));
            }
            document.getElementById('gen-password').value = retVal;
        }
        function copyPassword() {
            const passField = document.getElementById('gen-password');
            passField.select();
            passField.setSelectionRange(0, 99999);
            navigator.clipboard.writeText(passField.value);
            alert("Contraseña copiada al portapapeles.");
        }
    </script>
</body>
</html>
