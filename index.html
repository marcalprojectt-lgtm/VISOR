<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>WAR ROOM</title>

<style>
body {
  margin: 0;
  background: black;
  font-family: monospace;
  overflow: hidden;
}

/* HUD */
#hud {
  position: absolute;
  top: 20px;
  left: 20px;
  color: #00ff9d;
  border: 1px solid #00ff9d;
  padding: 10px;
}

/* PANEL */
#panel {
  position: absolute;
  top: 20px;
  right: 20px;
  width: 300px;
  background: black;
  border: 1px solid #00ff9d;
  padding: 10px;
  color: #00ff9d;
  display: none;
}

/* STATUS */
#status {
  position: absolute;
  bottom: 20px;
  left: 20px;
  color: orange;
}

#error {
  position: absolute;
  bottom: 50px;
  left: 20px;
  color: red;
}
</style>
</head>

<body>

<div id="hud">🛰️ WAR ROOM<br><span id="sys">INIT...</span></div>
<div id="panel">
  <h3 id="title"></h3>
  <a id="link" target="_blank">Ver fuente</a>
</div>
<div id="status"></div>
<div id="error"></div>
<div id="globeViz"></div>

<script src="https://unpkg.com/globe.gl"></script>

<script>

const sys = document.getElementById("sys");
const statusEl = document.getElementById("status");
const errorEl = document.getElementById("error");

let globe;

function init() {
  try {

    sys.innerText = "CARGANDO GLOBO...";

    globe = Globe()(document.getElementById("globeViz"))
      .globeImageUrl("https://unpkg.com/three-globe/example/img/earth-night.jpg") // ✔ ESTA SÍ FUNCIONA
      .backgroundColor("#000");

    sys.innerText = "GLOBO OK";

    loadData();

  } catch (e) {
    errorEl.innerText = "ERROR 3D: " + e.message;
    console.error(e);
  }
}

/* DATOS */
function loadData() {

  sys.innerText = "MODO DEMO";

  const data = [
    { title: "Airstrike Ukraine", lat:48, lng:31 },
    { title: "Gaza conflict", lat:31.5, lng:34.5 },
    { title: "Syria combat", lat:34, lng:38 },
    { title: "Iran tension", lat:32, lng:53 },
    { title: "North Korea missile", lat:40, lng:127 }
  ];

  globe.pointsData(data)
    .pointColor(() => "#00ff9d")
    .pointAltitude(0.02)
    .pointRadius(0.15);

  globe.ringsData(data)
    .ringColor(() => t => `rgba(0,255,157,${1-t})`)
    .ringMaxRadius(3)
    .ringPropagationSpeed(2)
    .ringRepeatPeriod(2000);

  globe.onPointClick(p => {
    const panel = document.getElementById("panel");
    document.getElementById("title").innerText = p.title;
    panel.style.display = "block";
  });

  statusEl.innerText = "Eventos: " + data.length;
}

init();

</script>
</body>
</html>
