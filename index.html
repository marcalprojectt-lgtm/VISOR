<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>WAR ROOM - INTELIGENCIA GLOBAL</title>

<style>
  body {
    margin: 0;
    background: #000;
    font-family: 'Courier New', Courier, monospace;
    overflow: hidden;
    color: #00ff9d;
  }

  #hud {
    position: absolute;
    top: 20px;
    left: 20px;
    background: rgba(0, 20, 0, 0.8);
    border: 1px solid #00ff9d;
    padding: 15px;
    box-shadow: 0 0 10px rgba(0,255,157,0.3);
    z-index: 10;
  }

  /* Panel extendido que no te saca de la web */
  #panel {
    position: absolute;
    top: 20px;
    right: 20px;
    width: 350px;
    max-height: 80vh;
    overflow-y: auto;
    background: rgba(0, 15, 0, 0.95);
    border: 1px solid #00ff9d;
    padding: 20px;
    display: none;
    box-shadow: 0 0 20px rgba(0,255,157,0.4);
    z-index: 10;
  }

  #panel h3 { margin-top: 0; color: #fff; text-shadow: 0 0 5px #00ff9d; border-bottom: 1px solid #00ff9d; padding-bottom: 10px; }
  #panel p { font-size: 0.9em; line-height: 1.5; color: #ccc; }
  
  .btn-cerrar {
    display: block;
    width: 100%;
    background: #00ff9d;
    color: #000;
    text-align: center;
    padding: 8px;
    margin-top: 15px;
    cursor: pointer;
    font-weight: bold;
    text-transform: uppercase;
  }
  .btn-cerrar:hover { background: #fff; }

  #status {
    position: absolute;
    bottom: 20px;
    left: 20px;
    color: orange;
    font-size: 0.8em;
    z-index: 10;
  }

  /* Estilo para la etiqueta que sale al pasar el ratón */
  .hover-label {
    background: rgba(0,0,0,0.9);
    border: 1px solid #00ff9d;
    padding: 5px 10px;
    color: #00ff9d;
    font-weight: bold;
  }
</style>
</head>

<body>

<div id="hud">
  <b>🛰️ WAR ROOM TERMINAL</b><br>
  <span id="sys" style="color: #fff; font-size: 0.8em;">ESTADO: ESCANEANDO RED...</span>
</div>

<div id="panel">
  <h3 id="title">TÍTULO DEL REPORTE</h3>
  <p id="description">Cargando detalles de inteligencia...</p>
  <div class="btn-cerrar" onclick="cerrarPanel()">CERRAR INFORME</div>
</div>

<div id="status">INICIALIZANDO SATÉLITES...</div>
<div id="globeViz"></div>

<script src="https://unpkg.com/globe.gl"></script>

<script>
const statusEl = document.getElementById("status");
const sysEl = document.getElementById("sys");
const panel = document.getElementById("panel");

// 1. GLOBO CON TEXTURAS DE ALTA RESOLUCIÓN Y RELIEVE
const globe = Globe()(document.getElementById("globeViz"))
  .globeImageUrl("https://unpkg.com/three-globe/example/img/earth-water.png") // Textura base más nítida
  .bumpImageUrl("https://unpkg.com/three-globe/example/img/earth-topology.png") // Relieve para montañas
  .backgroundColor("#000000")
  .pointOfView({ lat: 30, lng: 35, altitude: 2 });

// Diccionario de coordenadas para posicionar las noticias correctamente
const zonasCalientes = {
    "gaza": { lat: 31.4, lng: 34.4 }, "israel": { lat: 31.5, lng: 34.8 },
    "lebanon": { lat: 33.8, lng: 35.5 }, "ukraine": { lat: 48.3, lng: 35.0 },
    "russia": { lat: 55.7, lng: 37.6 }, "syria": { lat: 34.8, lng: 38.9 },
    "yemen": { lat: 15.5, lng: 44.2 }, "iran": { lat: 32.4, lng: 53.6 },
    "taiwan": { lat: 23.5, lng: 121.0 }, "korea": { lat: 39.0, lng: 125.7 },
    "sudan": { lat: 15.5, lng: 32.5 }
};

// 2. FUNCIÓN DE RASTREO (Se conecta a inteligencia, filtra y dibuja)
async function escanearConflictos() {
    sysEl.innerText = "ESTADO: ACTUALIZANDO DATOS...";
    try {
        // Buscamos solo operaciones militares (sin sismos)
        const query = encodeURIComponent('"military" OR "combat" OR "airstrike" OR "troops"');
        const url = `https://api.rss2json.com/v1/api.json?rss_url=https%3A%2F%2Fnews.google.com%2Frss%2Fsearch%3Fq%3D${query}%26hl%3Den-US`;
        
        const response = await fetch(url);
        const data = await response.json();
        
        if(data.status !== 'ok') throw new Error("Fallo de API");

        const puntosInteligencia = [];

        data.items.forEach(item => {
            const texto = (item.title + " " + item.content).toLowerCase();
            let coords = null;
            
            // Asignamos la noticia a su país exacto
            for (let zona in zonasCalientes) {
                if (texto.includes(zona)) {
                    coords = zonasCalientes[zona];
                    break;
                }
            }

            // Solo añadimos el punto si sabemos las coordenadas exactas (nada en el océano)
            if (coords) {
                // Limpiamos el texto HTML de la descripción para que quede texto plano legible
                const descLimpia = item.description.replace(/<[^>]*>?/gm, ''); 
                
                puntosInteligencia.push({
                    title: item.title,
                    desc: descLimpia,
                    lat: coords.lat + (Math.random() * 0.5 - 0.25), // Pequeña dispersión para no superponer puntos
                    lng: coords.lng + (Math.random() * 0.5 - 0.25)
                });
            }
        });

        dibujarMapa(puntosInteligencia);
        sysEl.innerText = "ESTADO: RASTREO ACTIVO";
        statusEl.innerText = `Última actualización: ${new Date().toLocaleTimeString()} | Eventos: ${puntosInteligencia.length}`;

    } catch (error) {
        sysEl.innerText = "ESTADO: ERROR DE CONEXIÓN";
    }
}

// 3. RENDERIZADO DEL MAPA E INTERACTIVIDAD
function dibujarMapa(datos) {
    globe.pointsData(datos)
      .pointColor(() => "#00ff9d")
      .pointAltitude(0.05)
      .pointRadius(0.5) // Más grande para asegurar el clic
      .pointLabel(d => `<div class="hover-label">📡 ${d.title}</div>`) // INFO ANTES DE HACER CLIC
      .onPointClick(d => {
          // PANEL EXTENDIDO EN LA MISMA WEB
          document.getElementById("title").innerText = "ALERTA MILITAR";
          document.getElementById("description").innerHTML = `
            <strong style="color:#fff;">${d.title}</strong><br><br>
            ${d.desc}
          `;
          panel.style.display = "block";
      });

    globe.ringsData(datos)
      .ringColor(() => t => `rgba(0,255,157,${1-t})`)
      .ringMaxRadius(3)
      .ringPropagationSpeed(1.5)
      .ringRepeatPeriod(1500);
}

// Cerrar panel manualmente
function cerrarPanel() {
    panel.style.display = "none";
}

// 4. AUTO-ACTUALIZACIÓN
escanearConflictos(); // Primer escaneo al abrir la web
setInterval(escanearConflictos, 300000); // Repetir cada 5 minutos (300.000 milisegundos)

// Cambio de cursor para que sepas que es clicable
globe.onPointHover(p => {
    document.body.style.cursor = p ? "crosshair" : "default"; // Cursor de mira telescópica
});

</script>
</body>
</html>
