<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>VISOR AUTOMÁTICO - EN DIRECTO</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; background: #0b0b0b; color: #00ff00; font-family: monospace; }
        #map { height: 100vh; width: 100%; }
        .overlay { position: absolute; top: 10px; left: 50px; z-index: 1000; background: rgba(0,0,0,0.8); padding: 15px; border: 1px solid #00ff00; }
        .reloj { color: #fff; font-size: 0.8em; margin-top: 5px; }
    </style>
</head>
<body>
    <div class="overlay">
        <b>SISTEMA DE VIGILANCIA GLOBAL</b><br>
        <small>ESTADO: CONECTADO (RED SÍSMICA EE.UU.)</small>
        <div class="reloj" id="hora">Actualizando...</div>
    </div>
    
    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const map = L.map('map').setView([30.0, 45.0], 4);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

        // FUNCIÓN INFALIBLE: Conexión a la red global pública
        async function obtenerDatosEnDirecto() {
            try {
                // Descarga anomalías de las últimas 24 horas en tiempo real
                const respuesta = await fetch('https://earthquake.usgs.gov/earthquakes/feed/v1.0/summary/2.5_day.geojson');
                const datos = await respuesta.json();

                datos.features.forEach(alerta => {
                    const coords = [alerta.geometry.coordinates[1], alerta.geometry.coordinates[0]];
                    const titulo = alerta.properties.title;
                    const intensidad = alerta.properties.mag;

                    // Color y tamaño según la gravedad
                    let colorPunto = "orange";
                    if (intensidad > 4.5) colorPunto = "red";
                    if (intensidad < 3) colorPunto = "yellow";

                    L.circleMarker(coords, {
                        radius: intensidad * 2, 
                        fillColor: colorPunto, 
                        color: "#fff", 
                        weight: 1, 
                        fillOpacity: 0.7
                    }).addTo(map)
                    .bindPopup(`<b>ALERTA DETECTADA</b><br><small>${titulo}</small>`);
                });

                document.getElementById('hora').innerText = "Conexión estable - Última lectura: " + new Date().toLocaleTimeString();

            } catch (error) {
                document.getElementById('hora').innerText = "Fallo de conexión crítico";
            }
        }

        obtenerDatosEnDirecto();
    </script>
</body>
</html>
