<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>SISTEMA DE INTELIGENCIA MILITAR 3D</title>
    <script src="https://unpkg.com/globe.gl"></script>
    <style>
        body { margin: 0; background-color: #000; overflow: hidden; color: #ff0000; font-family: 'Courier New', monospace; }
        #globeViz { width: 100vw; height: 100vh; }
        .radar-panel {
            position: absolute; top: 20px; left: 20px; 
            background: rgba(20, 0, 0, 0.9); padding: 15px; 
            border: 1px solid #ff0000; z-index: 100;
            box-shadow: 0 0 20px rgba(255,0,0,0.5); pointer-events: none;
        }
        #info-box {
            position: absolute; bottom: 20px; right: 20px;
            width: 300px; background: rgba(0,0,0,0.8);
            border: 1px solid #ff0000; color: #fff; padding: 10px;
            font-size: 12px; display: none; z-index: 100;
        }
    </style>
</head>
<body>
    <div class="radar-panel">
        <b style="font-size: 1.2em;">⚠️ MONITOR DE COMBATE GLOBAL</b><br>
        <span>STATUS: RASTREANDO ATAQUES Y MOVIMIENTOS</span><br>
        <small id="status">CONECTANDO A REDES DE INTELIGENCIA...</small>
    </div>

    <div id="info-box"></div>
    <div id="globeViz"></div>

    <script>
        const globe = Globe()
            (document.getElementById('globeViz'))
            .globeImageUrl('https://unpkg.com/three-globe/example/img/earth-night.jpg')
            .backgroundColor('#000000')
            .pointColor(() => '#ff0000')
            .pointAltitude(0.15)
            .pointRadius(0.8);

        async function cargarInteligenciaMilitar() {
            const status = document.getElementById('status');
            try {
                // Buscamos SOLO términos militares y de ataques en la base de datos de la ONU
                const query = "airstrike OR explosion OR 'armed conflict' OR 'military movement' OR attack";
                const url = `https://api.reliefweb.int/v1/reports?appname=visor_militar&query[value]=${encodeURIComponent(query)}&limit=100&sort[]=date:desc&profile=full`;
                
                const response = await fetch(url);
                const data = await response.json();
                
                const warPoints = data.data
                    .filter(d => d.fields && d.fields.primary_country && d.fields.primary_country.location)
                    .map(d => ({
                        lat: d.fields.primary_country.location.lat,
                        lng: d.fields.primary_country.location.lon,
                        title: d.fields.title,
                        country: d.fields.primary_country.name,
                        date: new Date(d.fields.date.created).toLocaleString(),
                        url: d.fields.url
                    }));

                globe.pointsData(warPoints)
                    .onPointClick(d => {
                        const box = document.getElementById('info-box');
                        box.style.display = 'block';
                        box.innerHTML = `
                            <strong style="color:red">REPORTE DE INTELIGENCIA</strong><br>
                            <hr>
                            <strong>PAÍS:</strong> ${d.country}<br>
                            <strong>FECHA:</strong> ${d.date}<br>
                            <strong>EVENTO:</strong> ${d.title}<br>
                            <br>
                            <a href="${d.url}" target="_blank" style="color:#0f0">VER INFORME COMPLETO</a>
                        `;
                    });

                // Añadimos anillos de radar solo a los puntos para dar aspecto de sonar
                globe.ringsData(warPoints)
                    .ringColor(() => '#ff0000')
                    .ringMaxRadius(2)
                    .ringPropagationSpeed(2)
                    .ringRepeatPeriod(1000);

                status.innerText = "SISTEMA SINCRONIZADO: MOSTRANDO EVENTOS BÉLICOS";
                status.style.color = "#0f0";
            } catch (err) {
                status.innerText = "INTERFERENCIA EN LA SEÑAL - REINTENTANDO";
                status.style.color = "red";
            }
        }

        cargarInteligenciaMilitar();
        globe.pointOfView({ lat: 30, lng: 35, altitude: 2 }); // Centrado en Oriente Medio
    </script>
</body>
</html>
