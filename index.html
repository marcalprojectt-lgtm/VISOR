<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Military Intelligence Globe</title>
  <style>
    body {
      margin: 0;
      background: black;
      font-family: Arial;
      overflow: hidden;
    }

    #globeViz {
      width: 100vw;
      height: 100vh;
    }

    #panel {
      position: absolute;
      top: 20px;
      right: 20px;
      width: 300px;
      background: rgba(0,0,0,0.9);
      border: 1px solid red;
      padding: 15px;
      color: white;
      display: none;
    }

    #panel a {
      color: red;
    }

    #status {
      position: absolute;
      bottom: 20px;
      left: 20px;
      color: orange;
    }
  </style>
</head>

<body>

<div id="globeViz"></div>

<div id="panel">
  <h3 id="title"></h3>
  <a id="link" target="_blank">Ver fuente</a>
</div>

<div id="status">🛰️ Iniciando sistema...</div>

<script src="//unpkg.com/globe.gl"></script>

<script>
const WORKER_URL = "TU_WORKER_URL"; // 🔥 CAMBIAR ESTO

const container = document.getElementById('globeViz');
const statusEl = document.getElementById('status');

function initGlobe() {
  try {
    const globe = Globe()(container)
      .globeImageUrl('//unpkg.com/three-globe/example/img/earth-night.jpg')
      .backgroundColor('#000000')
      .pointAltitude(0.01)
      .pointRadius(0.2)
      .pointColor(() => "rgba(255,0,0,0.8)");

    loadData(globe);

  } catch (e) {
    console.error("ERROR 3D:", e);
    container.innerHTML = "<h2 style='color:red'>⚠️ Error cargando visor 3D</h2>";
  }
}

async function loadData(globe) {
  try {
    statusEl.innerText = "🌐 Conectando con inteligencia militar...";

    const res = await fetch(WORKER_URL);
    const data = await res.json();

    const mapped = data.map(d => {
      const coords = getCoords(d.title);
      return coords.lat ? {
        ...coords,
        title: d.title,
        link: d.link
      } : null;
    }).filter(Boolean);

    globe.pointsData(mapped);

    globe.ringsData(mapped)
      .ringColor(() => t => `rgba(255,0,0,${1-t})`)
      .ringMaxRadius(3)
      .ringPropagationSpeed(1.5)
      .ringRepeatPeriod(2000);

    globe.onPointClick(p => showPanel(p));

    statusEl.innerText = "🟢 Sistema activo";

  } catch (e) {
    console.error("DATA ERROR:", e);
    retryConnection(globe);
  }
}

function retryConnection(globe) {
  statusEl.innerText = "🔄 Reintentando conexión segura...";
  setTimeout(() => loadData(globe), 5000);
}

function showPanel(p) {
  const panel = document.getElementById("panel");
  document.getElementById("title").innerText = p.title;
  document.getElementById("link").href = p.link;
  panel.style.display = "block";
}

function getCoords(text) {
  const map = {
    "ukraine": { lat: 48.3794, lng: 31.1656 },
    "russia": { lat: 61.5240, lng: 105.3188 },
    "gaza": { lat: 31.5, lng: 34.47 },
    "israel": { lat: 31.0, lng: 35.0 },
    "lebanon": { lat: 33.8547, lng: 35.8623 },
    "syria": { lat: 34.8021, lng: 38.9968 },
    "iran": { lat: 32.4279, lng: 53.6880 },
    "iraq": { lat: 33.2232, lng: 43.6793 },
    "china": { lat: 35.8617, lng: 104.1954 },
    "taiwan": { lat: 23.6978, lng: 120.9605 },
    "north korea": { lat: 40.3399, lng: 127.5101 },
    "south korea": { lat: 35.9078, lng: 127.7669 },
    "afghanistan": { lat: 33.9391, lng: 67.7100 }
  };

  const lower = text.toLowerCase();

  for (let key in map) {
    if (lower.includes(key)) return map[key];
  }

  return {};
}

initGlobe();
</script>

</body>
</html>
