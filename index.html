<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>WAR ROOM TERMINAL - V8.0 FINAL</title>
<style>
  body { margin: 0; background: #000; color: #00ff9d; font-family: 'Courier New', monospace; overflow: hidden; user-select: none; }
  body::after { content: " "; display: block; position: absolute; top: 0; left: 0; bottom: 0; right: 0; background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06)); z-index: 2; pointer-events: none; }
  .hud-box { position: absolute; background: rgba(0, 20, 0, 0.9); border: 1px solid #00ff9d; box-shadow: 0 0 15px rgba(0,255,157,0.2); z-index: 10; padding: 15px; border-radius: 3px; }
  #hud-main { top: 20px; left: 20px; border-left: 4px solid #00ff9d; max-width: 350px; }
  .leyenda { margin-top: 15px; font-size: 0.75em; border-top: 1px solid #00ff9d; padding-top: 10px; }
  .leyenda div { margin-bottom: 5px; }
  .dot { display: inline-block; width: 10px; height: 10px; border-radius: 50%; margin-right: 5px; }
  #info-panel { top: 20px; right: 20px; width: 350px; display: none; border-right: 4px solid #ff003c; border-left: 1px solid #ff003c; color: #fff; background: rgba(10, 0, 0, 0.95); }
  #info-panel h2 { color: #ff003c; border-bottom: 1px solid #444; padding-bottom: 10px; font-size: 1.2em; margin-top:0;}
  .data-label { color: #00ff9d; font-weight: bold; font-size: 0.8em; margin-top: 10px; display: block; }
  .data-value { color: #ddd; font-size: 0.9em; margin-bottom: 10px; display: block; line-height: 1.4; }
  .btn-cerrar { background: #ff003c; color: white; border: none; padding: 10px; width: 100%; cursor: pointer; font-weight: bold; margin-top: 20px; text-transform: uppercase; }
  .btn-cerrar:hover { background: #fff; color: #ff003c; }
</style>
</head>
<body>

<div class="hud-box" id="hud-main">
  <b style="font-size: 1.2em;">🛰️ WAR ROOM (V8.0 FINAL)</b><br>
  <span style="font-size: 0.8em; color: #aaa;">SISTEMA MULTICAPA BLINDADO</span><br>
  <div style="margin-top: 10px; font-size: 0.8em;">
    ESTADO: <span id="sys-status" style="color: yellow;">INICIALIZANDO SATÉLITES...</span>
  </div>
  <div class="leyenda">
    <div><span class="dot" style="background: #ff003c; box-shadow: 0 0 5px red;"></span> MILITAR (Ataques/Operaciones)</div>
    <div><span class="dot" style="background: #ffaa00;"></span> SOCIAL (Disturbios/Tensión)</div>
    <div><span class="dot" style="background: #0088ff; border-radius: 0;"></span> POLÍTICA (Crisis de Gobierno)</div>
  </div>
</div>

<div class="hud-box" id="info-panel">
  <h2 id="panel-header">ALERTA CONFIRMADA</h2>
  <span class="data-label">HORA / FUENTE</span>
  <span class="data-value" id="panel-date" style="color: yellow;">--</span>
  <span class="data-label">ANÁLISIS DE INTELIGENCIA</span>
  <span class="data-value" id="panel-title" style="font-weight: bold;">--</span>
  <button class="btn-cerrar" onclick="cerrarPanel()">CERRAR INFORME</button>
</div>

<div id="globeViz"></div>

<script src="https://unpkg.com/globe.gl"></script>

<script>
// Usamos una textura oscura muy estable para evitar fallos gráficos
const globe = Globe()(document.getElementById("globeViz"))
  .globeImageUrl('https://unpkg.com/three-globe/example/img/earth-dark.jpg')
  .backgroundColor("#000000")
  .pointOfView({ lat: 30, lng: 35, altitude: 2.2 });

const geodict = {
    "ukraine": {lat: 48.3, lng: 35.0, pais: "Ukraine"}, "russia": {lat: 55.7, lng: 37.6, pais: "Russia"},
    "gaza": {lat: 31.4, lng: 34.4, pais: "Israel"}, "israel": {lat: 31.5, lng: 34.8, pais: "Israel"},
    "lebanon": {lat: 33.8, lng: 35.5, pais: "Lebanon"}, "syria": {lat: 34.8, lng: 38.9, pais: "Syria"},
    "yemen": {lat: 15.5, lng: 44.2, pais: "Yemen"}, "iran": {lat: 32.4, lng: 53.6, pais: "Iran"},
    "taiwan": {lat: 23.5, lng: 121.0, pais: "Taiwan"}
};

let puntosMapa = [];
let paisesPolitica = [];

// DATOS DE RESPALDO REALISTAS (Garantizan que NUNCA verás la pantalla vacía)
const datosRespaldo = [
    {lat: 48.3, lng: 35.0, titulo: "Ofensiva con drones detectada en sector este.", tipo: "MILITAR", color: "#ff003c", fecha: "INTEL SECRETA"},
    {lat: 31.4, lng: 34.4, titulo: "Operaciones tácticas y bombardeos en zona urbana.", tipo: "MILITAR", color: "#ff003c", fecha: "INTEL SECRETA"},
    {lat: 15.5, lng: 44.2, titulo: "Interceptación de proyectiles en el Mar Rojo.", tipo: "MILITAR", color: "#ff003c", fecha: "INTEL SECRETA"},
    {lat: 48.85, lng: 2.35, titulo: "Manifestaciones masivas bloquean principales vías logísticas.", tipo: "SOCIAL", color: "#ffaa00", fecha: "INTEL SECRETA"},
    {lat: -34.6, lng: -58.3, titulo: "Enfrentamientos sindicales con fuerzas de seguridad.", tipo: "SOCIAL", color: "#ffaa00", fecha: "INTEL SECRETA"}
];

async function escanearNoticias() {
    try {
        const query = encodeURIComponent('(war OR attack OR strike OR protest OR riot OR election) when:1d');
        const url = `https://api.rss2json.com/v1/api.json?rss_url=https%3A%2F%2Fnews.google.com%2Frss%2Fsearch%3Fq%3D${query}%26hl%3Den-US`;
        
        const res = await fetch(url);
        const json = await res.json();
        
        if(json.status !== 'ok') throw new Error("API Bloqueada");

        json.items.forEach(item => {
            const titulo = item.title.toLowerCase();
            let matchedGeo = null;

            for (let key in geodict) {
                if (titulo.includes(key)) {
                    matchedGeo = geodict[key];
                    break;
                }
            }

            if (matchedGeo) {
                let tipo = "POLÍTICA"; let color = "#0088ff"; 
                if (titulo.match(/attack|war|strike|missile|idf|troops|killed|bomb/)) {
                    tipo = "MILITAR"; color = "#ff003c";
                } else if (titulo.match(/protest|riot|demonstration|clash/)) {
                    tipo = "SOCIAL"; color = "#ffaa00";
                }

                if (tipo === "POLÍTICA") {
                    if (!paisesPolitica.includes(matchedGeo.pais)) paisesPolitica.push(matchedGeo.pais);
                } else {
                    const existe = puntosMapa.find(p => p.lat === matchedGeo.lat && p.tipo === tipo);
                    if (!existe) {
                        puntosMapa.push({
                            lat: matchedGeo.lat + (Math.random()*0.5 - 0.25), lng: matchedGeo.lng + (Math.random()*0.5 - 0.25),
                            titulo: item.title.split(" - ")[0], tipo: tipo, color: color, fecha: item.pubDate
                        });
                    }
                }
            }
        });

        if (puntosMapa.length === 0) throw new Error("Filtro vacío");
        
        dibujarSistema(puntosMapa, paisesPolitica);
        sysLog("CONEXIÓN SATELITAL EN LÍNEA (DATOS LIVE)", "#00ff9d");

    } catch (e) {
        // SI LA RED FALLA O TE BLOQUEA, CARGAMOS EL RESPALDO TÁCTICO
        paisesPolitica = ["United Kingdom", "Venezuela"]; // Simulamos países en crisis
        dibujarSistema(datosRespaldo, paisesPolitica);
        sysLog("RED BLOQUEADA - USANDO ENLACE TÁCTICO DE RESPALDO", "#ffaa00");
    }
}

function dibujarSistema(puntos, paisesAzules) {
    // 1. Puntos y Radares
    globe.pointsData(puntos)
      .pointColor("color").pointAltitude(0.08).pointRadius(1.2).pointResolution(32)
      .pointLabel(d => `<div style="background:rgba(0,0,0,0.9); padding:5px; border:1px solid ${d.color}; color:white; font-family:monospace;">[${d.tipo}] ${d.titulo}</div>`)
      .onPointClick((point) => {
          if (!point) return;
          document.getElementById("info-panel").style.display = "block";
          document.getElementById("panel-header").innerText = `ALERTA: ${point.tipo}`;
          document.getElementById("panel-header").style.color = point.color;
          document.getElementById("panel-date").innerText = point.fecha;
          document.getElementById("panel-title").innerText = point.titulo;
      });

    globe.ringsData(puntos.filter(p => p.tipo === "MILITAR"))
      .ringColor("color").ringMaxRadius(4).ringPropagationSpeed(1.5).ringRepeatPeriod(1200);

    // 2. Países Políticos (Azules)
    fetch('https://raw.githubusercontent.com/vasturiano/globe.gl/master/example/datasets/ne_110m_admin_0_countries.geojson')
      .then(res => res.json())
      .then(countries => {
        globe.polygonsData(countries.features)
          .polygonCapColor(d => paisesAzules.includes(d.properties.ADMIN) ? 'rgba(0, 136, 255, 0.4)' : 'rgba(0,0,0,0)')
          .polygonSideColor(() => 'rgba(0, 255, 157, 0.05)')
          .polygonStrokeColor(d => paisesAzules.includes(d.properties.ADMIN) ? '#0088ff' : '#111')
          .polygonLabel(d => paisesAzules.includes(d.properties.ADMIN) ? `<div style="background:rgba(0,0,0,0.9); border:1px solid #0088ff; color:white; padding:5px; font-family:monospace;">⚠️ CRISIS POLÍTICA: ${d.properties.ADMIN}</div>` : '');
      });
}

function cerrarPanel() { document.getElementById("info-panel").style.display = "none"; }
function sysLog(msg, color) { 
    document.getElementById("sys-status").innerText = msg; 
    document.getElementById("sys-status").style.color = color; 
}

globe.onPointHover(p => document.body.style.cursor = p ? "crosshair" : "default");

escanearNoticias();
setInterval(escanearNoticias, 300000);
</script>
</body>
</html>
