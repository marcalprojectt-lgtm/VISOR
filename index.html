<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>WAR ROOM</title>

<style>
body {
  margin: 0;
  background: black;
  font-family: monospace;
  overflow: hidden;
}

#hud {
  position: absolute;
  top: 20px;
  left: 20px;
  color: #00ff9d;
  border: 1px solid #00ff9d;
  padding: 10px;
}

#panel {
  position: absolute;
  top: 20px;
  right: 20px;
  width: 300px;
  background: black;
  border: 1px solid #00ff9d;
  padding: 10px;
  color: #00ff9d;
  display: none;
}

#status {
  position: absolute;
  bottom: 20px;
  left: 20px;
  color: orange;
}
</style>
</head>

<body>

<div id="hud">🛰️ WAR ROOM<br><span id="sys">ACTIVO</span></div>

<div id="panel">
  <h3 id="title"></h3>
  <a id="link" target="_blank">Ver fuente</a>
</div>

<div id="status"></div>
<div id="globeViz"></div>

<script src="https://unpkg.com/globe.gl"></script>

<script>

const statusEl = document.getElementById("status");

const globe = Globe()(document.getElementById("globeViz"))
  .globeImageUrl("https://unpkg.com/three-globe/example/img/earth-night.jpg")
  .backgroundColor("#000")

/* 🔥 DATOS */
const data = [
  { title: "Airstrike Ukraine", lat:48, lng:31, link:"#"},
  { title: "Gaza conflict", lat:31.5, lng:34.5, link:"#"},
  { title: "Syria combat", lat:34, lng:38, link:"#"},
  { title: "Iran tension", lat:32, lng:53, link:"#"},
  { title: "North Korea missile", lat:40, lng:127, link:"#"}
];

/* 🔴 PUNTOS (VISUAL FINO + HITBOX GRANDE) */
globe.pointsData(data)
  .pointColor(() => "#00ff9d")
  .pointAltitude(0.02)
  .pointRadius(0.2) // 👈 IMPORTANTE: grande para click

/* 🟢 RINGS */
globe.ringsData(data)
  .ringColor(() => t => `rgba(0,255,157,${1-t})`)
  .ringMaxRadius(3)
  .ringPropagationSpeed(2)
  .ringRepeatPeriod(2000);

/* 🎯 HOVER (MEJORA UX) */
globe.onPointHover(p => {
  document.body.style.cursor = p ? "pointer" : "default";
});

/* 🧠 CLICK REAL */
globe.onPointClick((point) => {
  if (!point) return;

  const panel = document.getElementById("panel");

  document.getElementById("title").innerText = point.title;
  document.getElementById("link").href = point.link || "#";

  panel.style.display = "block";
});

/* INFO */
statusEl.innerText = "Eventos: " + data.length;

</script>
</body>
</html>
