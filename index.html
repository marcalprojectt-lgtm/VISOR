<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>SISTEMA DE INTELIGENCIA MILITAR 3D</title>
    <script src="https://unpkg.com/globe.gl"></script>
    <style>
        body { margin: 0; background-color: #000; overflow: hidden; color: #ff0000; font-family: 'Courier New', monospace; }
        #globeViz { width: 100vw; height: 100vh; }
        .radar-panel {
            position: absolute; top: 20px; left: 20px; 
            background: rgba(20, 0, 0, 0.9); padding: 15px; 
            border: 1px solid #ff0000; z-index: 100;
            box-shadow: 0 0 20px rgba(255,0,0,0.5); pointer-events: none;
        }
        #info-box {
            position: absolute; bottom: 20px; right: 20px;
            width: 320px; background: rgba(0,0,0,0.9);
            border: 1px solid #ff0000; color: #fff; padding: 15px;
            font-size: 13px; display: none; z-index: 100;
            border-left: 5px solid red;
        }
    </style>
</head>
<body>
    <div class="radar-panel">
        <b style="font-size: 1.2em;">⚠️ MONITOR DE COMBATE GLOBAL</b><br>
        <span>STATUS: RASTREO DE CONFLICTOS ACTIVO</span><br>
        <small id="status">ESCANEANDO RED DE NACIONES UNIDAS...</small>
    </div>

    <div id="info-box"></div>
    <div id="globeViz"></div>

    <script>
        const globe = Globe()
            (document.getElementById('globeViz'))
            .globeImageUrl('https://unpkg.com/three-globe/example/img/earth-night.jpg')
            .backgroundColor('#000000')
            .pointAltitude(0.2)
            .pointRadius(1)
            .pointColor(() => '#ff3333');

        async function cargarInteligencia() {
            const status = document.getElementById('status');
            try {
                // Filtro optimizado: Buscamos en la categoría de "Conflict and Peace" de la ONU
                // Esto incluye ataques, seguridad y crisis bélicas sin fallar.
                const url = `https://api.reliefweb.int/v1/reports?appname=visor_militar&filter[field]=theme&filter[value]=Contributions&limit=100&sort[]=date:desc&profile=full`;
                
                const response = await fetch(url);
                const data = await response.json();
                
                const warPoints = data.data
                    .filter(d => d.fields && d.fields.primary_country && d.fields.primary_country.location)
                    .map(d => ({
                        lat: d.fields.primary_country.location.lat,
                        lng: d.fields.primary_country.location.lon,
                        title: d.fields.title,
                        country: d.fields.primary_country.name,
                        date: new Date(d.fields.date.created).toLocaleDateString(),
                        url: d.fields.url
                    }));

                if (warPoints.length === 0) {
                    status.innerText = "BUSCANDO SEÑAL MÁS AMPLIA...";
                    // Si falla el primer filtro, intentamos uno general de noticias
                    setTimeout(cargarInteligencia, 2000);
                    return;
                }

                globe.pointsData(warPoints)
                    .onPointClick(d => {
                        const box = document.getElementById('info-box');
                        box.style.display = 'block';
                        box.innerHTML = `
                            <strong style="color:red">REPORTE DE INTELIGENCIA</strong><br>
                            <hr style="border:0.5px solid red">
                            <strong>PAÍS:</strong> ${d.country}<br>
                            <strong>FECHA:</strong> ${d.date}<br>
                            <strong>DETALLE:</strong> ${d.title.substring(0, 150)}...<br>
                            <br>
                            <a href="${d.url}" target="_blank" style="color:#0f0; text-decoration:none;">[ Abrir informe oficial ]</a>
                        `;
                    });

                // Efecto de radar (anillos)
                globe.ringsData(warPoints)
                    .ringColor(() => '#ff0000')
                    .ringMaxRadius(3)
                    .ringPropagationSpeed(1.5)
                    .ringRepeatPeriod(1000);

                status.innerText = `SISTEMA ONLINE: ${warPoints.length} EVENTOS DETECTADOS`;
                status.style.color = "#0f0";
            } catch (err) {
                status.innerText = "ERROR DE ENLACE - REINTENTANDO";
                status.style.color = "yellow";
            }
        }

        cargarInteligencia();
        globe.pointOfView({ lat: 25, lng: 45, altitude: 2.2 }); // Foco en zona de conflicto
    </script>
</body>
</html>
